# ITD validation-laboratory experiment matrix (post-V29 research phase).
#
# Machine-readable catalogue of controlled experiments. Each entry declares its
# ground truth, prediction target, ITD channels, comparison diagnostics, and
# evidence class. "source" is a local deterministic solver/analytical field, or a
# registered external dataset id (see datasets/registry.json). Experiments whose
# source is external and not yet integrated are marked evidence_class = "blocked".
#
# This file is descriptive, not executable on its own; the runner
# (itd_research.validation_lab) reads it and executes the feasible rows.

schema = "itd-validation-lab/1"

[[experiment]]
experiment_id = "an_solid_rotation"
flow_family = "laminar_coherent"
source = "analytical:rigid_rotation"
dimensionality = "3D"
solver_or_dataset = "analytical_fields"
ground_truth = "constant vorticity, zero strain, zero stretching"
prediction_target = "none"
itd_channels = ["intensity", "orientation_dispersion", "stretching_rate", "normalized_helicity"]
comparison_diagnostics = ["q_criterion", "lambda2", "swirling_strength"]
resolution = "17^3"
time_window = "single_snapshot"
threshold_policy = "n/a"
random_seed = 0
expected_runtime_class = "fast"
evidence_class = "analytical"

